<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test Page</h1>
    <div id="test"></div>
    <script>
        fetch('http://localhost:5001/api/health')
            .then(r => r.json())
            .then(data => {
                document.getElementById('test').innerHTML = 'Backend: ' + JSON.stringify(data);
            })
            .catch(err => {
                document.getElementById('test').innerHTML = 'Error: ' + err;
            });
    </script>
</body>
</html>
